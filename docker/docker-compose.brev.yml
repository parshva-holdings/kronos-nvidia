# Brev-flavored compose. Boots Streamlit, FastAPI, and Jupyter Lab simultaneously
# so the Brev console exposes one click-to-open URL per service.
#
# Brev port-naming convention:
#   - 8888  → "jupyter" (gives you the Open Notebook button)
#   - all other named ports surface as click-through links in the deployment view
#
# Reference: https://docs.nvidia.com/brev/concepts/launchables

services:
  kronos:
    image: kronos-nvidia:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      KRONOS_DEVICE: "cuda:0"
      HF_HOME: /opt/hf_cache
      JUPYTER_ENABLE_LAB: "yes"
    ports:
      - target: 8888
        published: 8888
      - target: 8501
        published: 8501
      - target: 8000
        published: 8000
    labels:
      brev.port.8888: "jupyter"
      brev.port.8501: "dashboard"
      brev.port.8000: "api"
    volumes:
      - hf_cache:/opt/hf_cache
      - /home/ubuntu:/workspace  # Brev's default workspace path
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    shm_size: "8gb"
    # Boot order: warm the HF cache in the background, start the API, start
    # Jupyter, then foreground the Streamlit dashboard. Brev shows a green
    # dot next to each port as soon as the corresponding service responds.
    command: >
      bash -lc "
      python /app/scripts/02_download_models.py >/tmp/dl.log 2>&1 &
      uvicorn nvidia.api_server:app --host 0.0.0.0 --port 8000 >/tmp/api.log 2>&1 &
      jupyter lab --ip=0.0.0.0 --port=8888 --allow-root --no-browser \
        --NotebookApp.token='' --NotebookApp.password='' \
        --notebook-dir=/workspace >/tmp/jupyter.log 2>&1 &
      streamlit run /app/webui_streamlit/app.py \
        --server.port 8501 --server.address 0.0.0.0 \
        --server.headless true --browser.gatherUsageStats false
      "

volumes:
  hf_cache: {}
